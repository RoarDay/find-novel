name: publish

# push tag v* → 构建 sdist/wheel → twine 上传 PyPI
# 需在仓库 Settings → Secrets 配置 PYPI_API_TOKEN（PyPI 账号 → API token，scope: 项目）
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # 手动触发（便于回归发版流程）

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # 备用：trusted-publishing（若 PyPI 项目已配 OIDC）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*
